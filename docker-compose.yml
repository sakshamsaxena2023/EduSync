version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: mystudymatch_db
    restart: always
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=supersecurepassword123
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: mystudymatch_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://admin:supersecurepassword123@mongo:27017/mystudymatch?authSource=admin
      - JWT_SECRET=secretkey123
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: mystudymatch_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
