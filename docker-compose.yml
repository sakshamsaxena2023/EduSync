version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: mystudymatch_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: mystudymatch_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/mystudymatch
      - JWT_SECRET=secretkey123
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: mystudymatch_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
